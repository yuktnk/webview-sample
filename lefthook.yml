# スキップ方法: LEFTHOOK=0 git commit または git commit --no-verify
#
# 設計判断:
# - lint・biome-check はステージングされたファイルのみ対象（{staged_files}）
# - secretlint はステージングされたファイルのみ対象（機密情報の流出防止）
# - typecheck は pre-push（--incremental でキャッシュ活用・pre-commit だと重い）
# - E2E テストは CI/CD のみ（Playwright はローカルで走らせるには重すぎる）

parallel: true

skip:
  - merge
  - rebase

pre-commit:
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx}'
      run: pnpm eslint {staged_files} --max-warnings 0 --no-warn-ignored
      fail_text: "ESLint errors found. Run 'pnpm lint' to see details."

    biome-check:
      glob: '*.{ts,tsx,js,jsx,json,css}'
      run: pnpm exec biome check {staged_files}
      fail_text: "Biome errors found. Run 'pnpm biome:fix' to fix."

    secretlint:
      run: pnpm secretlint {staged_files}
      fail_text: 'Secrets detected. Remove credentials before committing.'

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
      fail_text: 'Invalid commit message. Use format: type(scope): description (e.g. feat: add login)'

pre-push:
  commands:
    typecheck:
      run: pnpm tsc --noEmit --incremental
      fail_text: "TypeScript errors found. Run 'pnpm typecheck' to see details."

    test:
      run: pnpm vitest run
      fail_text: "Tests failed. Run 'pnpm test' to see details."
